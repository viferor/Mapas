<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor de Mapas y Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Panel inferior minimalista y ultra-transparente en una línea */
        .control-panel {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            max-width: 750px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 10px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            box-sizing: border-box;
        }

        .btn {
            padding: 8px 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            text-align: center;
            white-space: nowrap;
            background: #e4e6eb;
            color: #333;
            transition: background 0.15s, transform 0.1s;
            touch-action: manipulation;
        }

        .btn-active-blue { background-color: #3388ff !important; color: white !important; }
        .btn-active-red { background-color: #ff4d4d !important; color: white !important; }
        .btn-yellow { background-color: #ffcc00; color: #333; }
        .btn-green { background-color: #28a745; color: white; }
        .btn-cyan { background-color: #17a2b8; color: white; }
        
        .btn:active { transform: scale(0.93); }

        /* Iconos Leaflet */
        .number-icon {
            background: #3388ff;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Toast Avisos */
        #toast-aviso {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Modal GitHub */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 85%;
            max-width: 340px;
            max-height: 75vh;
            overflow-y: auto;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Botonera Reactiva -->
    <div class="control-panel">
        <button id="btn-ruta" class="btn btn-active-blue" type="button" onclick="setModo('ruta')">📍 Callejero</button>
        <button id="btn-aislado" class="btn" type="button" onclick="setModo('aislado')">📌 Aislados</button>
        <button id="btn-puntos-rectos" class="btn" type="button" onclick="setModo('dibujar_puntos')">✏️ Rectos</button>
        <button id="btn-continuo" class="btn" type="button" onclick="setModo('continuo')">〰️ Alzada</button>
        <button id="btn-borrar" class="btn" type="button" onclick="setModo('borrar')">🗑️</button>
        <button id="btn-deshacer" class="btn" type="button" onclick="deshacerUltimo()">↩️</button>
        <button id="btn-rehacer" class="btn" type="button" onclick="rehacerProximo()">🔁</button>
        <button id="btn-cortar" class="btn btn-yellow" type="button" onclick="cortarTramoActual()">✂️</button>
        <button id="btn-guardar" class="btn btn-blue" type="button" onclick="abrirModalGithub('guardar')">💾</button>
        <button id="btn-cargar" class="btn" type="button" onclick="abrirModalGithub('cargar')">📂</button>
        <button id="btn-gpx" class="btn btn-cyan" type="button" onclick="document.getElementById('input-archivo-gpx').click()">📥 GPX</button>
        <button id="btn-compartir" class="btn btn-green" type="button" onclick="abrirModalGithub('compartir')">🔗</button>
    </div>

    <!-- Input oculto para leer archivos GPX del dispositivo -->
    <input type="file" id="input-archivo-gpx" accept=".gpx" style="display: none;" onchange="manejarArchivoGPX(event)">

    <div id="toast-aviso"></div>

    <div id="modal-load" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-titulo" style="margin-top: 0; font-size: 16px;">Gestión de Mapas</h3>
            <div id="lista-mapas" style="max-height: 200px; overflow-y: auto; margin-bottom: 12px; font-size: 13px;">Cargando...</div>
            <button class="btn" style="width: 100%; background: #ccc;" type="button" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
