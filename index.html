<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Mapas y Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Estilos personalizados -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            bottom: 0;
        }
        /* Controles flotantes superiores */
        #controls {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-active-draw { background: #ffc107; color: black; }
        .btn-active-erase { background: #343a40; color: white; }

        /* Estilos de la ventana modal para Cargar/Guardar/Compartir */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover { color: black; }
        .map-item {
            padding: 10px;
            margin: 5px 0;
            background: #f1f1f1;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .map-item:hover { background: #e2e2e2; }
    </style>
</head>
<body>

    <!-- Contenedor del Mapa -->
    <div id="map"></div>

    <!-- Barra de Controles y Herramientas -->
    <div id="controls">
        <button id="btn-draw" class="btn btn-primary" onclick="setModo('dibujar')">✏️ Dibujar</button>
        <button id="btn-erase" class="btn btn-secondary" onclick="setModo('borrar')">🧹 Borrar</button>
        <button class="btn btn-secondary" onclick="deshacerUltimo()">↩️ Deshacer</button>
        <button class="btn btn-secondary" onclick="rehacerProximo()">↪️ Rehacer</button>
        <button class="btn btn-danger" onclick="borrarTodo()">🗑️ Limpiar</button>

        <!-- Selectores de Estilo de Línea -->
        <input type="color" id="color" value="#ff0000" onchange="actualizarEstiloRuta()" title="Color de línea">
        <select id="grosor" onchange="actualizarEstiloRuta()" title="Grosor de línea">
            <option value="3">Fino</option>
            <option value="5" selected>Medio</option>
            <option value="8">Grueso</option>
            *<option value="12">Muy Grueso</option>
        </select>
        <select id="opacidad" onchange="actualizarEstiloRuta()" title="Opacidad">
            <option value="100">100%</option>
            <option value="75" selected>75%</option>
            <option value="50">50%</option>
        </select>

        <!-- Botones de GitHub y Archivos -->
        <button class="btn btn-success" onclick="guardarEnGithub()">☁️ Guardar</button>
        <button class="btn btn-primary" onclick="abrirModalCargarGithub()">📂 Cargar</button>
        <button class="btn btn-primary" onclick="compartirMapaGithub()">🔗 Compartir</button>
        <button class="btn btn-secondary" onclick="cambiarToken()">🔑 Token</button>

        <!-- Importar GPX -->
        <input type="file" id="gpx-file" accept=".gpx" style="display:none;" onchange="importarGPX(event)">
        <button class="btn btn-secondary" onclick="document.getElementById('gpx-file').click()">📥 GPX</button>
    </div>

    <!-- Ventana Modal para la Lista de Mapas -->
    <div id="modal-load" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3 style="margin-top: 0;">Gestión de Mapas</h3>
            <div id="lista-mapas">Cargando...</div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet GPX plugin (por si lo usas para cargar ficheros GPX) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    
    <!-- Tu Script principal de la aplicación -->
    <script src="app.js"></script>
</body>
</html>
