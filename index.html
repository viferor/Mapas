<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Mapas y Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: sans-serif;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Panel de control inferior: Ocupa todo el ancho, flotante y transparente */
        .control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px 12px 18px 12px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 13px;
        }

        .btn {
            padding: 9px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            text-align: center;
        }

        .btn-blue { background-color: #3388ff; color: white; }
        .btn-red { background-color: #ff4d4d; color: white; }
        .btn-gray { background-color: rgba(224, 224, 224, 0.85); color: #333; }
        .btn-yellow { background-color: #ffcc00; color: #333; }
        .btn:hover { opacity: 0.9; }

        /* Estilos de los iconos de Leaflet personalizados */
        .number-icon {
            background: #3388ff;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .circle-marker-icon {
            background: transparent;
        }

        /* Toast flotante de avisos (situado justo encima de la botonera) */
        #toast-aviso {
            position: absolute;
            bottom: 155px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Modal para GitHub */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Panel de Controles Flotante Inferior Ancho Total -->
    <div class="control-panel">
        <!-- Botones de Modo -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
            <button id="btn-numeros" class="btn btn-blue">Puntos / Ruta</button>
            <button id="btn-dibujo" class="btn btn-gray">Dibujar</button>
        </div>

        <!-- Selector de Submodo para Dibujar (Aparece automáticamente al pulsar Dibujar) -->
        <div id="draw-submode-container" style="display: none;">
            <select id="draw-type-select" style="width: 100%; padding: 6px; border-radius: 4px; font-size: 12px; background: rgba(255,255,255,0.9); border: 1px solid #ccc;">
                <option value="puntos">Punto a punto (rectas)</option>
                <option value="continuo">Mano alzada continua</option>
            </select>
        </div>

        <!-- Selector de Submodo para Números / Callejero -->
        <div class="control-group">
            <select id="route-type-select" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; background: rgba(255,255,255,0.9);">
                <option value="callejero">Por Callejero (OSRM)</option>
                <option value="aislado">Puntos Aislados (Rectas)</option>
            </select>
        </div>

        <!-- Acciones principales y guardado compactas -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;">
            <button id="btn-borrar" class="btn btn-gray" style="font-size: 12px;">Borrar el.</button>
            <button id="btn-deshacer" class="btn btn-gray" style="font-size: 12px;">↩️ Deshacer</button>
            <button id="btn-rehacer" class="btn btn-gray" style="font-size: 12px;">🔁 Rehacer</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
            <button id="btn-cortar" class="btn btn-yellow" style="color: black; font-size: 12px;">✂️ Cortar Tramo</button>
            <button id="btn-borrar-todo" class="btn btn-red" style="font-size: 12px;">🗑️ Borrar Todo</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;">
            <button id="btn-guardar" class="btn btn-blue" style="font-size: 11px; padding: 7px;">💾 Guardar</button>
            <button id="btn-cargar" class="btn btn-gray" style="font-size: 11px; padding: 7px;">📂 Cargar</button>
            <button id="btn-compartir" class="btn btn-blue" style="background-color: #28a745; font-size: 11px; padding: 7px;">🔗 Compartir</button>
        </div>
    </div>

    <!-- Toast Avisos -->
    <div id="toast-aviso"></div>

    <!-- Modal para Cargar / Guardar / Compartir -->
    <div id="modal-load" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-titulo" style="margin-top: 0; font-size: 16px;">Gestión de Mapas</h3>
            <div id="lista-mapas" style="max-height: 200px; overflow-y: auto; margin-bottom: 12px; font-size: 13px;">Cargando...</div>
            <button class="btn btn-gray" style="width: 100%;" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Tu Script Principal -->
    <script src="app.js"></script>
</body>
</html>
