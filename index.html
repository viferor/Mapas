<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramienta de Mapas Móvil</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Botonera inferior fija, transparente y adaptable */
        #toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 95%;
            justify-content: center;
        }
        #toolbar button, #toolbar label {
            background: #ffffff;
            border: 1px solid #ccc;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        #toolbar button:active, #toolbar label:active {
            background: #e0e0e0;
        }
        #import-file {
            display: none;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Botonera inferior -->
    <div id="toolbar">
        <button id="btn-draw">Dibujar</button>
        <button id="btn-clear">Limpiar</button>
        <label for="import-file">Cargar Archivo</label>
        <input type="file" id="import-file" accept=".gpx,.txt,.json">
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar mapa
        const map = L.map('map').setView([37.8882, -4.7794], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let drawnItems = L.featureGroup().addTo(map);

        // Lógica de carga de archivos (GPX, TXT, JSON)
        document.getElementById('import-file').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                try {
                    // 1. Si es formato GeoJSON / JSON
                    if (file.name.endsWith('.json')) {
                        const data = JSON.parse(content);
                        const layer = L.geoJSON(data);
                        drawnItems.addLayer(layer);
                        map.fitBounds(layer.getBounds());
                    } 
                    // 2. Si es formato GPX (XML)
                    else if (file.name.endsWith('.gpx') || content.includes('<gpx')) {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(content, "text/xml");
                        const trkpts = xmlDoc.getElementsByTagName('trkpt');
                        let latlngs = [];

                        for (let i = 0; i < trkpts.length; i++) {
                            const lat = parseFloat(trkpts[i].getAttribute('lat'));
                            const lon = parseFloat(trkpts[i].getAttribute('lon'));
                            latlngs.push([lat, lon]);
                        }

                        if (latlngs.length > 0) {
                            const polyline = L.polyline(latlngs, { color: 'blue' });
                            drawnItems.addLayer(polyline);
                            map.fitBounds(polyline.getBounds());
                        } else {
                            alert("No se encontraron puntos de track (trkpt) en el archivo GPX.");
                        }
                    } 
                    // 3. Si es un archivo de texto plano con coordenadas (ej: lat,lon por línea)
                    else {
                        const lines = content.split('\n');
                        let latlngs = [];
                        
                        lines.forEach(line => {
                            const parts = line.trim().split(',');
                            if (parts.length >= 2) {
                                const lat = parseFloat(parts[0]);
                                const lon = parseFloat(parts[1]);
                                if (!isNaN(lat) && !isNaN(lon)) {
                                    latlngs.push([lat, lon]);
                                }
                            }
                        });

                        if (latlngs.length > 0) {
                            const polyline = L.polyline(latlngs, { color: 'red' });
                            drawnItems.addLayer(polyline);
                            map.fitBounds(polyline.getBounds());
                        } else {
                            alert("El archivo de texto no contiene coordenadas válidas en formato 'lat,lon'.");
                        }
                    }
                } catch (error) {
                    console.error("Error al procesar el archivo:", error);
                    alert("Hubo un error al interpretar el archivo.");
                }
            };

            reader.readAsText(file);
            event.target.value = ''; // Resetear input
        });

        // Limpiar mapa
        document.getElementById('btn-clear').addEventListener('click', () => {
            drawnItems.clearLayers();
        });
    </script>
</body>
</html>
