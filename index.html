<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Mapas y Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Estilo moderno con panel flotante inferior totalmente transparente -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 950px;
            padding: 10px 12px;
            background: transparent; /* Fondo 100% transparente */
            backdrop-filter: none;   /* Sin desenfoque de fondo */
            border: none;            /* Sin bordes */
            box-shadow: none;        /* Sin sombras de caja para mantenerlo integrado */
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Estilo perfecto y redondo para los números con fondo dinámico */
        .number-icon {
            background: #007bff;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .number-icon span {
            font-size: 13px;
            line-height: 1;
        }

        /* Botones con una ligera sombra propia para destacar en total transparencia */
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-warning { background: #ffc107; color: black; }

        /* Sombra de texto para legibilidad perfecta sobre cualquier fondo de mapa */
        .control-panel label {
            color: #222;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.9), 0 0 5px rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- Contenedor del Mapa -->
    <div id="map"></div>

    <!-- Panel de Control Flotante Inferior Totalmente Transparente -->
    <div id="control-panel" class="control-panel">
        <div class="grupo-botones" style="display: flex; gap: 5px; align-items: center;">
            <button id="btn-number" class="btn btn-primary">Números</button>
            <!-- Selector de comportamiento para el modo número -->
            <div id="contenedor-submodo-numero" style="display: flex; align-items: center;">
                <select id="select-submodo-numero" onchange="cambiarSubmodoNumero(event)" class="btn" style="background: white; color: #333; padding: 6px; cursor: pointer;">
                    <option value="ruta">Ruta (Callejero)</option>
                    <option value="aislado">Solo Número (Aislado)</option>
                </select>
            </div>
            <button id="btn-draw" class="btn btn-secondary">Dibujo Libre</button>
            <button id="btn-erase" class="btn btn-secondary">Borrar</button>
        </div>

        <div class="grupo-estilos" style="display: flex; gap: 8px; align-items: center;">
            <label>Color: <input type="color" id="color" value="#007bff"></label>
            <label>Grosor: <input type="range" id="grosor" min="2" max="30" value="13" style="width: 70px;"></label>
            <label>Opacidad: <input type="range" id="opacidad" min="10" max="100" value="35" style="width: 70px;"></label>
        </div>

        <div class="grupo-acciones" style="display: flex; gap: 5px;">
            <button class="btn btn-secondary" onclick="cortarTramoActual()" title="Corta el tramo actual para empezar una ruta independiente">Cortar Tramo</button>
            <button class="btn btn-secondary" onclick="deshacerUltimo()">Deshacer</button>
            <button class="btn btn-secondary" onclick="rehacerProximo()">Rehacer</button>
            <button class="btn btn-danger" onclick="borrarTodo()">Borrar Todo</button>
        </div>

        <div class="grupo-github" style="display: flex; gap: 5px;">
            <button class="btn btn-success" onclick="guardarEnGithub()">Guardar</button>
            <button class="btn btn-info" onclick="abrirModalCargarGithub()">Cargar</button>
            <button class="btn btn-warning" onclick="compartirMapaGithub()">Compartir</button>
            <button class="btn btn-secondary" onclick="cambiarToken()">Token</button>
        </div>
    </div>

    <!-- Modal para cargar / eliminar mapas de GitHub -->
    <div id="modal-load" class="modal" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.5);">
        <div class="modal-content" style="background-color:white; margin: 15% auto; padding: 20px; width: 80%; max-width: 400px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0; margin-bottom: 15px;">Mapas Guardados</h3>
            <div id="lista-mapas" style="max-height: 250px; overflow-y: auto; margin: 15px 0; display: flex; flex-direction: column; gap: 8px;">
                <!-- Aquí se inyectan los mapas dinámicamente -->
            </div>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Lector GPX (opcional) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <!-- Archivo de lógica principal -->
    <script src="app.js"></script>
</body>
</html>
