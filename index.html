<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor de Mapas y Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Panel inferior minimalista y ultra-transparente en una línea */
        .control-panel {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 720px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 5px 8px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2px;
            box-sizing: border-box;
        }

        .btn {
            padding: 7px 8px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
            font-size: 10px;
            text-align: center;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .btn-blue { background-color: #3388ff; color: white; }
        .btn-red { background-color: #ff4d4d; color: white; }
        .btn-yellow { background-color: #ffcc00; color: #333; }
        .btn:active { opacity: 0.7; transform: scale(0.96); }

        /* Iconos Leaflet */
        .number-icon {
            background: #3388ff;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Toast Avisos */
        #toast-aviso {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Modal GitHub */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 15px;
            border-radius: 12px;
            width: 85%;
            max-width: 320px;
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Botonera Minimalista Directa con Importar GPX -->
    <div class="control-panel">
        <button id="btn-ruta" class="btn" type="button">📍 Callejero</button>
        <button id="btn-aislado" class="btn" type="button">📌 Aislados</button>
        <button id="btn-puntos-rectos" class="btn" type="button">✏️ Rectos</button>
        <button id="btn-continuo" class="btn" type="button">〰️ Alzada</button>
        <button id="btn-borrar" class="btn" type="button">🗑️</button>
        <button id="btn-deshacer" class="btn" type="button">↩️</button>
        <button id="btn-rehacer" class="btn" type="button">🔁</button>
        <button id="btn-cortar" class="btn btn-yellow" type="button">✂️</button>
        <button id="btn-guardar" class="btn btn-blue" type="button">💾</button>
        <button id="btn-cargar" class="btn" type="button">📂</button>
        <button id="btn-gpx" class="btn" type="button" style="background-color: #17a2b8; color: white;" title="Importar GPX">📥 GPX</button>
        <button id="btn-compartir" class="btn" type="button" style="background-color: #28a745; color: white;">🔗</button>
    </div>

    <!-- Input oculto para leer archivos GPX del dispositivo -->
    <input type="file" id="input-archivo-gpx" accept=".gpx" style="display: none;">

    <div id="toast-aviso"></div>

    <div id="modal-load" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-titulo" style="margin-top: 0; font-size: 15px;">Gestión de Mapas</h3>
            <div id="lista-mapas" style="max-height: 180px; overflow-y: auto; margin-bottom: 10px; font-size: 12px;">Cargando...</div>
            <button class="btn" style="width: 100%; background: #ddd;" type="button" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
