    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            /* Inhabilita el "arrastrar para refrescar" en móviles */
            overscroll-behavior: none;
            touch-action: none;
        }
        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            bottom: 0;
            /* Evita gestos nativos del navegador dentro del área del mapa */
            touch-action: none;
        }
        /* Controles flotantes superiores */
        #controls {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            /* Permite hacer scroll o tocar dentro del menú si es necesario */
            touch-action: auto;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-active-draw { background: #ffc107; color: black; }
        .btn-active-erase { background: #343a40; color: white; }

        /* Estilos de la ventana modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            touch-action: auto;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover { color: black; }
        .map-item {
            padding: 10px;
            margin: 5px 0;
            background: #f1f1f1;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .map-item:hover { background: #e2e2e2; }
    </style>
