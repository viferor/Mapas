<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Mapas y Rutas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body,#map{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial}
#map{position:absolute}
.control-panel{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.btn{padding:6px 12px;border:0;border-radius:6px;color:white;font-weight:bold}
.btn-blue{background:#007bff}.btn-gray{background:#6c757d}.btn-red{background:#dc3545}.btn-green{background:#28a745}.btn-cyan{background:#17a2b8}.btn-yellow{background:#ffc107;color:#000}
.number-icon{background:#007bff;color:white;border-radius:50%;border:2px solid white;text-align:center;font-weight:bold;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.3);font-size:12px}
</style>
</head>
<body>
<div id="map"></div>
<div class="control-panel">
<button id="btn-numeros" class="btn btn-blue">Números</button>
<button id="btn-dibujo" class="btn btn-gray">Dibujo Libre</button>
<button id="btn-borrar" class="btn btn-gray">Borrar</button>
<input id="color-picker" type="color" value="#3388ff">
<input id="grosor-range" type="range" min="1" max="10" value="4">
<input id="opacidad-range" type="range" min="0.1" max="1" step="0.1" value="1">
<button id="btn-cortar" class="btn btn-gray">Cortar</button>
<button id="btn-deshacer" class="btn btn-gray">Deshacer</button>
<button id="btn-rehacer" class="btn btn-gray">Rehacer</button>
<button id="btn-borrar-todo" class="btn btn-red">Borrar Todo</button>
<button id="btn-guardar" class="btn btn-green">Guardar</button>
<button id="btn-cargar" class="btn btn-cyan">Cargar</button>
<button id="btn-compartir" class="btn btn-yellow">Compartir</button>
<button id="btn-token" class="btn btn-gray">Token</button>
</div>
<div id="modal-load"><div id="lista-mapas"></div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
