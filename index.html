<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Mapas y Rutas</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 950px;
            padding: 10px 12px;
            background: transparent;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .btn-blue { background: #007bff; }
        .btn-gray { background: #6c757d; }
        .btn-red { background: #dc3545; }
        .btn-green { background: #28a745; }
        .btn-cyan { background: #17a2b8; }
        .btn-yellow { background: #ffc107; color: black; }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.85);
            padding: 5px 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .number-icon {
            background: #007bff;
            color: white;
            border-radius: 50%;
            border: 2px solid white;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Contenedor del Mapa -->
    <div id="map"></div>

    <!-- Panel de Control Flotante -->
    <div class="control-panel">
        <button id="btn-numeros" class="btn btn-blue">Números</button>
        
        <div class="control-group">
            <select id="route-type-select" class="btn btn-gray" style="padding: 5px;">
                <option value="callejero">Ruta (Callejero)</option>
                <option value="linea">Línea recta</option>
            </select>
        </div>

        <button id="btn-dibujo" class="btn btn-gray">Dibujo Libre</button>
        <button id="btn-borrar" class="btn btn-gray">Borrar</button>
        
        <div class="control-group">
            <label for="color-picker" style="font-size: 12px; font-weight: bold;">Color:</label>
            <input type="color" id="color-picker" value="#3388ff" style="border: none; width: 25px; height: 25px; cursor: pointer; background: none;">
        </div>

        <div class="control-group">
            <label for="grosor-range" style="font-size: 12px; font-weight: bold;">Grosor:</label>
            <input type="range" id="grosor-range" min="1" max="10" value="4" style="width: 70px;">
        </div>

        <div class="control-group">
            <label for="opacidad-range" style="font-size: 12px; font-weight: bold;">Opacidad:</label>
            <input type="range" id="opacidad-range" min="0.1" max="1" step="0.1" value="1" style="width: 70px;">
        </div>

        <button id="btn-cortar" class="btn btn-gray">Cortar Tramo</button>
        <button id="btn-deshacer" class="btn btn-gray">Deshacer</button>
        <button id="btn-rehacer" class="btn btn-gray">Rehacer</button>
        <button id="btn-borrar-todo" class="btn btn-red">Borrar Todo</button>
        <button id="btn-guardar" class="btn btn-green">Guardar</button>
        <button id="btn-cargar" class="btn btn-cyan">Cargar</button>
        <button id="btn-compartir" class="btn btn-yellow">Compartir</button>
        <button id="btn-token" class="btn btn-gray">Token</button>
    </div>

    <!-- Modal Unificado -->
    <div id="modal-load" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <h3 id="modal-titulo" style="margin-top: 0; color: #333;">Gestión de Mapas</h3>
            <div id="lista-mapas" style="margin: 15px 0; min-height: 50px;">Cargando...</div>
            <div style="text-align: right;">
                <button class="btn btn-gray" onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Script Principal -->
    <script src="app.js"></script>
</body>
</html>
