<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor de Mapas y Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Panel inferior minimalista y ultra-transparente en una línea */
        .control-panel {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 600px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 5px 8px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            box-sizing: border-box;
        }

        .btn {
            padding: 7px 10px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            text-align: center;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            transition: all 0.2s;
        }

        .btn-blue { background-color: #3388ff; color: white; }
        .btn-red { background-color: #ff4d4d; color: white; }
        .btn-yellow { background-color: #ffcc00; color: #333; }
        .btn:active { opacity: 0.7; transform: scale(0.96); }

        /* Menú desplegable flotante contextual justo encima de la botonera */
        .submode-menu {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            padding: 6px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            gap: 4px;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .submode-menu button {
            background: #fff;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
        }

        .submode-menu button.active {
            background: #3388ff;
            color: white;
            border-color: #3388ff;
        }

        /* Iconos Leaflet */
        .number-icon {
            background: #3388ff;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .circle-marker-icon { background: transparent; }

        /* Toast Avisos */
        #toast-aviso {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Modal GitHub */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 15px;
            border-radius: 12px;
            width: 85%;
            max-width: 320px;
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Menús contextuales flotantes para elegir submodos -->
    <div id="menu-puntos" class="submode-menu">
        <button id="sub-callejero" onclick="cambiarSubmodoNumero('ruta')">📍 Por Callejero (OSRM)</button>
        <button id="sub-aislado" onclick="cambiarSubmodoNumero('aislado')">📍 Puntos Aislados (Rectas)</button>
    </div>

    <div id="menu-dibujo" class="submode-menu">
        <button id="sub-rectos" onclick="cambiarSubmodoDibujo('puntos')">✏️ Punto a punto (Rectas)</button>
        <button id="sub-continuo" onclick="cambiarSubmodoDibujo('continuo')">✏️ Mano alzada continua</button>
    </div>

    <!-- Botonera Minimalista en una sola línea flotante -->
    <div class="control-panel">
        <button id="btn-numeros" class="btn">📍 Puntos</button>
        <button id="btn-dibujo" class="btn">✏️ Dibujar</button>
        <button id="btn-borrar" class="btn">🗑️ Borrar</button>
        <button id="btn-deshacer" class="btn">↩️</button>
        <button id="btn-rehacer" class="btn">🔁</button>
        <button id="btn-cortar" class="btn btn-yellow">✂️</button>
        <button id="btn-guardar" class="btn btn-blue">💾</button>
        <button id="btn-cargar" class="btn">📂</button>
        <button id="btn-compartir" class="btn" style="background-color: #28a745; color: white;">🔗</button>
    </div>

    <div id="toast-aviso"></div>

    <div id="modal-load" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-titulo" style="margin-top: 0; font-size: 15px;">Gestión de Mapas</h3>
            <div id="lista-mapas" style="max-height: 180px; overflow-y: auto; margin-bottom: 10px; font-size: 12px;">Cargando...</div>
            <button class="btn" style="width: 100%; background: #ddd;" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
