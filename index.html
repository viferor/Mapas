<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Mapas y Rutas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Panel de Control / Controles Superiores -->
    <div id="control-panel" class="control-panel">
        <div class="grupo-botones">
            <button id="btn-number" class="btn btn-primary">Números</button>
            <button id="btn-draw" class="btn btn-secondary">Dibujo Libre</button>
            <button id="btn-erase" class="btn btn-secondary">Borrar</button>
        </div>

        <div class="grupo-estilos">
            <label>Color: <input type="color" id="color" value="#007bff"></label>
            <label>Grosor: <input type="range" id="grosor" min="2" max="30" value="13"></label>
            <label>Opacidad: <input type="range" id="opacidad" min="10" max="100" value="35"></label>
        </div>

        <div class="grupo-acciones">
            <button class="btn btn-secondary" onclick="deshacerUltimo()">Deshacer</button>
            <button class="btn btn-secondary" onclick="rehacerProximo()">Rehacer</button>
            <button class="btn btn-danger" onclick="borrarTodo()">Borrar Todo</button>
        </div>

        <div class="grupo-github">
            <button class="btn btn-success" onclick="guardarEnGithub()">Guardar en GitHub</button>
            <button class="btn btn-info" onclick="abrirModalCargarGithub()">Cargar de GitHub</button>
            <button class="btn btn-warning" onclick="compartirMapaGithub()">Compartir Mapa</button>
            <button class="btn btn-secondary" onclick="cambiarToken()">Token</button>
        </div>
    </div>

    <!-- Contenedor del Mapa -->
    <div id="map"></div>

    <!-- Modal para cargar / eliminar mapas de GitHub -->
    <div id="modal-load" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.5);">
        <div class="modal-content" style="background-color:white; margin: 15% auto; padding: 20px; width: 80%; max-width: 400px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0; margin-bottom: 15px;">Mapas Guardados</h3>
            <div id="lista-mapas" style="max-height: 250px; overflow-y: auto; margin: 15px 0; display: flex; flex-direction: column; gap: 8px;">
                <!-- Aquí se inyectan los mapas dinámicamente -->
            </div>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 10px;" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Lector GPX (opcional) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <!-- Archivo de lógica principal -->
    <script src="app.js"></script>
</body>
</html>
