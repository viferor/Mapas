<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapas y Rutas - Córdoba</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Panel de controles abajo, transparente, estricto a 2 líneas con scroll horizontal */
        .panel-controles {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            display: grid;
            grid-template-rows: repeat(2, auto);
            grid-auto-flow: column;
            grid-auto-columns: max-content;
            gap: 6px;
            align-items: center;
            max-width: 95vw;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .panel-controles::-webkit-scrollbar {
            height: 4px;
        }

        .panel-controles::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }

        .btn {
            background: rgba(248, 249, 250, 0.85);
            border: 1px solid #ced4da;
            color: #212529;
            padding: 7px 11px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: background 0.15s, border-color 0.15s;
            user-select: none;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn:active {
            background: #e2e6ea;
        }

        .btn-blue {
            background: #007bff;
            color: white;
            border-color: #006fe6;
        }
        .btn-blue:active {
            background: #0056b3;
        }

        .btn-green {
            background: #28a745;
            color: white;
            border-color: #218838;
        }

        .btn-yellow {
            background: #ffc107;
            color: #212529;
            border-color: #e0a800;
        }

        .btn-red {
            background: #dc3545;
            color: white;
            border-color: #bd2130;
        }

        .btn-active-blue {
            background: #0056b3 !important;
            color: white !important;
            border-color: #004085 !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .btn-active-red {
            background: #bd2130 !important;
            color: white !important;
            border-color: #961c27 !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .number-icon {
            background: #007bff;
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .number-icon span {
            display: block;
            line-height: 24px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Contenedor del Mapa -->
    <div id="map"></div>

    <!-- Toast de avisos flotantes -->
    <div id="toast-aviso" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; font-size: 14px;"></div>

    <!-- Barra de Herramientas Inferior / Controles (2 líneas con scroll) -->
    <div class="panel-controles">
        <button id="btn-ruta" class="btn" onclick="setModo('ruta')">Ruta OSRM</button>
        <button id="btn-aislado" class="btn" onclick="setModo('aislado')">Puntos Aislados</button>
        <button id="btn-puntos-rectos" class="btn" onclick="setModo('dibujar_puntos')">Rectos</button>
        <button id="btn-continuo" class="btn" onclick="setModo('continuo')">Mano Alzada</button>
        <button id="btn-borrar" class="btn" onclick="setModo('borrar')">Borrar</button>
        
        <!-- Controles de Estilo Integrados (Color, Grosor y Opacidad) -->
        <div class="btn" style="background: rgba(248,249,250,0.85); cursor: default;">
            🎨 <input type="color" id="color-trazo" value="#3388ff" style="border:none; width:22px; height:18px; background:transparent; cursor:pointer;" title="Color del trazo">
        </div>
        <div class="btn" style="background: rgba(248,249,250,0.85); cursor: default; font-size: 11px;">
            Grosor: <input type="range" id="grosor-trazo" min="1" max="10" value="4" style="width: 45px; cursor: pointer;">
        </div>
        <div class="btn" style="background: rgba(248,249,250,0.85); cursor: default; font-size: 11px;">
            Opacidad: <input type="range" id="opacidad-trazo" min="0.1" max="1" step="0.1" value="1" style="width: 45px; cursor: pointer;">
        </div>

        <!-- Botón para importar listado de calles en texto plano -->
        <button class="btn btn-blue" onclick="document.getElementById('input-archivo-texto').click()">📁 Cargar Calles (.txt)</button>
        <input type="file" id="input-archivo-texto" accept=".txt" style="display: none;" onchange="procesarArchivoTextoRuta(event)">

        <!-- Opciones de Archivos GPX y Gestión -->
        <button class="btn" onclick="document.getElementById('input-gpx').click()">Cargar GPX</button>
        <input type="file" id="input-gpx" accept=".gpx" style="display: none;" onchange="manejarArchivoGPX(event)">

        <button class="btn" onclick="deshacerUltimo()">↩️ Deshacer</button>
        <button class="btn" onclick="rehacerProximo()">🔁 Rehacer</button>
        <button class="btn" onclick="cortarTramoActual()">✂️ Cortar Tramo</button>
        <button class="btn btn-red" onclick="confirmarBorrarTodo()">🗑️ Borrar Todo</button>
        
        <!-- GitHub Sync -->
        <button class="btn btn-green" onclick="abrirModalGithub('guardar')">☁️ Guardar</button>
        <button class="btn btn-green" onclick="abrirModalGithub('cargar')">📂 Abrir</button>
        <button class="btn btn-yellow" onclick="abrirModalGithub('compartir')">🔗 Compartir</button>
    </div>

    <!-- Modal para GitHub -->
    <div id="modal-load" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; width:300px; max-height:80vh; overflow-y:auto;">
            <h3>Mapas en GitHub</h3>
            <div id="lista-mapas" style="margin: 15px 0;"></div>
            <button class="btn" style="width:100%; background:#ccc;" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Lógica de la Aplicación -->
    <script src="app.js"></script>
</body>
</html>
